name: Tests

# Runs the Pester suite on Linux in mock mode (no Fastmail token needed).
# Path-filtered: only runs when the code it actually exercises changes.

on:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "mocks/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "mocks/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pester:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 (2024-10-23)

      # act-only: the default act runner image has no pwsh; GitHub-hosted
      # ubuntu-latest already does, so this is skipped on real runs.
      - name: Ensure PowerShell (act only)
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          command -v pwsh >/dev/null 2>&1 && exit 0
          . /etc/os-release
          wget -q "https://packages.microsoft.com/config/ubuntu/${VERSION_ID}/packages-microsoft-prod.deb" -O /tmp/pmc.deb
          sudo dpkg -i /tmp/pmc.deb
          sudo apt-get update -qq
          sudo apt-get install -y -qq powershell

      - name: Install Pester
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -SkipPublisherCheck
          (Get-Module -ListAvailable Pester | Sort-Object Version -Descending | Select-Object -First 1).Version.ToString()

      - name: Run Pester (mock mode)
        shell: pwsh
        env:
          FASTMAIL_MOCK_DIR: ${{ github.workspace }}/mocks
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path = './tests'
          $cfg.Run.Exit = $true
          $cfg.Output.Verbosity = 'Detailed'
          $cfg.TestResult.Enabled = $true
          $cfg.TestResult.OutputPath = 'testResults.xml'
          Invoke-Pester -Configuration $cfg

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2 (2025-03-19)
        with:
          name: pester-results
          path: testResults.xml
